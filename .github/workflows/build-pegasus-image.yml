# .github/workflows/build-pegasus-image.yml
#
# Automatically builds and pushes the Pegasus Docker image to ghcr.io
# whenever any of the files that form the image are changed on the main branch.
#
# Image URI: ghcr.io/gersteinlab/scrna_processing/pegasus:{tag}
#
# Tags applied on each build:
#   - The git tag (e.g. v1.2) if the push is a tagged release
#   - The short git SHA (e.g. sha-a3f2c1b) for every push
#   - "latest" for every push to main
#
# After the first push, set the package visibility to Public in:
#   GitHub → gersteinlab org → Packages → pegasus → Package settings → Change visibility
# This is required for Terra (Cromwell) to pull the image without credentials.

name: Build and Push Pegasus Docker Image

on:
  push:
    branches:
      - main
    # Only trigger when files that affect the image actually change
    paths:
      - "terra_wdl/Dockerfile.pegasus"
      - "terra_wdl/requirements.txt"
      - "Pegasus-Pipeline.py"
      - "terra_wdl/cellranger_task.py"
      - "terra_wdl/cellbender_task.py"
      - "AHBA_PFC_filtered.json"
      - "Hybrid_subclass_markers.json"

  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image version tag (e.g. 1.1). Defaults to short SHA."
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gersteinlab/scrna_processing/pegasus

jobs:
  build-and-push:
    name: Build and push Pegasus image
    runs-on: ubuntu-latest

    # Grant the job permission to write packages to ghcr.io
    permissions:
      contents: read
      packages: write

    steps:
      # ----------------------------------------------------------------
      # 1. Check out the repository
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Log in to ghcr.io using the built-in GITHUB_TOKEN
      #    No personal access token or secret configuration required.
      # ----------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----------------------------------------------------------------
      # 3. Determine image tags
      #    - If triggered manually with a tag → use that tag
      #    - If triggered by a git tag push → use the git tag
      #    - Always also tag with the short SHA and "latest"
      # ----------------------------------------------------------------
      - name: Determine image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          # Start with sha and latest tags
          TAGS="${BASE}:sha-${SHORT_SHA},${BASE}:latest"

          # Add git release tag if this push is a tag
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            GIT_TAG="${{ github.ref_name }}"
            TAGS="${TAGS},${BASE}:${GIT_TAG}"
            echo "Building release tag: ${GIT_TAG}"
          fi

          # Add manually specified tag if provided via workflow_dispatch
          MANUAL_TAG="${{ github.event.inputs.tag }}"
          if [[ -n "${MANUAL_TAG}" ]]; then
            TAGS="${TAGS},${BASE}:${MANUAL_TAG}"
            echo "Building manual tag: ${MANUAL_TAG}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Final tags: ${TAGS}"

      # ----------------------------------------------------------------
      # 4. Set up Docker Buildx for efficient layer caching
      # ----------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----------------------------------------------------------------
      # 5. Build and push the image
      #    The Dockerfile.pegasus expects these files to be present at
      #    the repo root level (COPY instructions use relative paths).
      #    The build context is the repo root.
      # ----------------------------------------------------------------
      - name: Build and push Pegasus image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: terra_wdl/Dockerfile.pegasus
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Cache layers from the previous build to speed up rebuilds
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      # ----------------------------------------------------------------
      # 6. Print a summary of what was pushed
      # ----------------------------------------------------------------
      - name: Image build summary
        run: |
          echo "### Pegasus image pushed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags pushed:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.tags.outputs.tags }}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step:** In Terra's workflow input form, set \`pegasus_docker\` to:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Option A reminder:** The gersteinlab/ScRNA_processing repo is private." >> $GITHUB_STEP_SUMMARY
          echo "> To allow Terra (Cromwell) to pull the image without credentials, make" >> $GITHUB_STEP_SUMMARY
          echo "> the package visibility Public:" >> $GITHUB_STEP_SUMMARY
          echo "> GitHub → gersteinlab org → Packages → pegasus → Package settings → Change visibility → **Public**" >> $GITHUB_STEP_SUMMARY
